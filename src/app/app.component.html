<router-outlet /> <ngx-sonner-toaster />
<!-- Header global con logo y avatar -->
<header
  class="app-header bg-gradient-to-r from-primary to-primary-light text-white shadow-md animate-slide-fade"
  role="banner"
  aria-label="Encabezado principal"
>
  <div class="app-header__left">
    <img src="imagenes/l1.svg" alt="Emonical" class="logo" />
    <span class="brand">Emonical</span>
  </div>

  <div class="app-header__right">
    <img
      src="/imagenes/Emonical_good.png"
      alt="Avatar"
      class="avatar"
      referrerpolicy="no-referrer"
    />
  </div>
</header>

<!-- Contenido de la app -->
<main class="app-main animate-fade-in" role="main">
  <router-outlet></router-outlet>
</main>

<!-- Toaster (puede ir al final del body del shell) -->
<ngx-sonner-toaster></ngx-sonner-toaster>
